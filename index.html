<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Currencies converter</title>
	<link rel="icon" type="image/png" href="favicon.png">
	<script src="dist/main.js"></script>
</head>
<body>
    <div class="wrapper">
		<div class="main-screen" id="main-screen">
			<div class="display">
				<span class="display__from-value" id="from-value"></span>
				<button class="display__from-currency text-button" id="from-currency"></button>
				=
				<span class="display__to-value" id="to-value"></span>
				<button class="display__to-currency text-button" id="to-currency"></button>
			</div>
			<div class="ruler" id="ruler"></div>
		</div>
		<div class="choose-currency-screen hidden" id="choose-currency-screen">
			<button class="choose-currency-screen__back" id="back-button">Back</button>
			<div class="choose-currency-screen__title">Choose target currency:</div>
			<div class="currency-list" id="currency-list"></div>
		</div>
	</div>
	<div class="credits">
		<a href="https://www.exchangerate-api.com" target="_blank">Rates By Exchange Rate API</a>
	</div>
</body>
</html>
